pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      
    go-vet:
      root: "backend/"
      run: go vet ./...
      
    golangci-lint:
      root: "backend/"
      run: golangci-lint run --fix
      
    gosec:
      root: "backend/"
      run: gosec ./...

    # go-test:
    #   run: go test  ./...